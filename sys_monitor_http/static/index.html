<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 20px;
        }
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }
        .info-card {
            background-color: #f0f0f0;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            width: 500px;
            max-width: 100%;
            flex: 0 1 500px;
        }
    </style>
</head>
<body>
    <h1>System Monitor</h1>

    <div class="cards">
        <div class="info-card">
            <h2>CPU Usage</h2>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <div class="info-card">
            <h2>Memory Usage</h2>
            <div class="chart-container">
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <div class="info-card" id="temperatureCard" style="display: none;">
            <h2>RPi Temperature</h2>
            <div class="chart-container">
                <canvas id="temperatureChart"></canvas>
            </div>
        </div>

        <div class="info-card">
            <h2>Disk Usage</h2>
            <div id="diskInfo"></div>
        </div>

        <div class="info-card">
            <h2>System Uptime</h2>
            <p id="uptime"></p>
        </div>
    </div>

    <script src="static/system_monitor.js"></script>
</body>
</html>
